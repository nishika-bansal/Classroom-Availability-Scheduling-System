<!DOCTYPE html>
<html>
<head>
    <title>Schedule Lecture</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<h2><i class="fa-solid fa-calendar-plus"></i> Schedule Lecture</h2>

<form onsubmit="addSchedule(event)">
    <label>Room Number:</label><br>
    <input type="text" id="room_id" required><br><br>

    <label>Course Name:</label><br>
    <input type="text" id="course_name" required><br><br>

    <label>Faculty Name:</label><br>
    <input type="text" id="faculty_name" required><br><br>

    <label>Date:</label><br>
    <input type="date" id="date" required><br><br>

    <label>Start Time:</label><br>
    <input type="time" id="start_time" required><br><br>

    <label>End Time:</label><br>
    <input type="time" id="end_time" required><br><br>

    <button type="submit">
        <i class="fa-solid fa-plus"></i> Add Schedule
    </button>
</form>

<p id="message"></p>

<br>

<button onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
</button>

<button onclick="loadSchedules()">View Schedule</button>

<table border="1">
<thead>
<tr>
<th>Room</th>
<th>Course</th>
<th>Faculty</th>
<th>Date</th>
<th>Start</th>
<th>End</th>
</tr>
</thead>

<tbody id="scheduleTable"></tbody>
</table>

<!-- ✅ IMPORTANT: JS FILE -->
<script src="../js/schedule.js"></script>

<!-- ✅ ADD THIS (MISSING THA) -->
<script>
function goBack() {
    window.location.href = "../dashboard.html";
}
</script>

</body>
</html>
