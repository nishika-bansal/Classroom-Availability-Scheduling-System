<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <h2><i class="fa-solid fa-right-to-bracket"></i>Login</h2>
    <div>
    
    <input type="text" id="username" placeholder="Username" autocomplete="username"><br><br>

   
    <input type="password" id="password" placeholder="Password" autocomplete="current-password"><br><br>

    <!--  Login Button -->
    <button onclick="login(event)"><i class="fa-solid fa-arrow-right-to-bracket"></i>Login</button>
    </div>


    <!--  Message Display (ADD THIS HERE) -->
    <p id="message" style="font-weight: bold;"></p>

    <!--  JS FILE (ALWAYS AT BOTTOM) -->
    <script src="./js/auth.js"></script>

</body>
</html>
